<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <span class="nav-logo-icon">◆</span>
      <span class="nav-logo-text">Synth<span class="accent">AI</span></span>
    </a>

    <div class="nav-links" id="navLinks">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </div>

    <div class="nav-actions">
      <button class="nav-search-btn" onclick="toggleSearch()" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <a href="/newsletter/" class="btn btn-primary hide-mobile">Subscribe</a>
      <button class="nav-menu-btn hide-desktop" onclick="toggleMenu()" aria-label="Menu">
        <span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-menu-close" onclick="toggleMenu()">✕</button>
  {{ range .Site.Menus.main }}
    <a href="{{ .URL }}" class="mobile-menu-link">{{ .Name }}</a>
  {{ end }}
</div>

<!-- Search Overlay -->
<div class="search-overlay" id="searchOverlay" onclick="toggleSearch()">
  <div class="search-box" onclick="event.stopPropagation()">
    <input type="text" class="search-input" placeholder="Search articles..." id="searchInput" autocomplete="off">
    <p class="search-hint">Press ESC to close</p>
  </div>
</div>
