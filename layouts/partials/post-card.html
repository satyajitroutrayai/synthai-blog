<article class="post-card">
  <a href="{{ .Permalink }}" class="post-card-link">
    <div class="post-card-image" style="background: {{ with .Params.gradient }}{{ . }}{{ else }}linear-gradient(135deg, #302b63, #24243e){{ end }}">
      {{ with .Params.icon }}<span class="post-card-icon">{{ . }}</span>{{ end }}
    </div>
    <div class="post-card-body">
      <div class="post-card-meta">
        {{ with .Params.categories }}
          {{ range first 1 . }}
            <span class="post-card-category">{{ . }}</span>
          {{ end }}
        {{ end }}
      </div>
      <h3 class="post-card-title">{{ .Title }}</h3>
      <p class="post-card-excerpt">{{ .Summary | truncate 150 }}</p>
      <div class="post-card-footer">
	<div class="post-card-tags">
          {{ with .Params.tags }}{{ range first 2 . }}
            <span class="tag">{{ . }}</span>
          {{ end }}{{ end }}
        </div>
        <span class="post-card-read-time">{{ .ReadingTime }} min read</span>
      </div>
    </div>
  </a>
</article>
